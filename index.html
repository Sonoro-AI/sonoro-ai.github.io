<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SONORO — Resonant Intelligence</title>
<meta name="description" content="Sonoro. Intelligence that resonates. Arriving 2026.">
<meta name="theme-color" content="#07090a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
<link rel="manifest" href="manifest.json">
</head>
<body class="state-initial">

<!-- Atmosphere -->
<div class="atmosphere"></div>
<canvas class="stars" id="starsCanvas"></canvas>

<!-- Resonance mark (always visible — the constant) -->
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="ringCanvas"></canvas>
</div>

<!-- Grain -->
<div class="grain"></div>

<!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- Stage typography (SONORO + cycling) -->
<div class="stage">
  <h1 class="wordmark" id="wordmark" aria-label="Sonoro"></h1>
  <div class="rule" aria-hidden="true"></div>
  <div class="strapline">
    <span>Resonate</span>
    <span class="cycle-wrap" id="cycleWrap" aria-hidden="true"></span>
  </div>
</div>

<!-- Centred tagline (loop phases 1 + 3) -->
<div class="tagline-center" id="taglineCenter">Intelligence that resonates</div>

<!-- Enter button (initial state only) — pill style matching Listen -->
<button class="entry" id="entry" aria-label="Enter">Enter</button>

<!-- Editorial metadata -->
<div class="meta meta--bl">
  <div><span class="val">London · Swansea · Dubai</span></div>
</div>
<div class="meta meta--br">
  <div><span class="lbl">Arriving</span></div>
  <div><span class="accent">Autumn MMXXVI</span></div>
</div>

<!-- Listen toggle -->
<button class="listen" id="listen" aria-label="Toggle ambient sound">
  <span class="listen-icon" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </span>
  <span class="listen-label">Listening</span>
</button>

<!-- Chat bar (loop phase 4) -->
<div class="chatbar" id="chatbar" aria-label="Ask Sonoro">
  <span class="chatbar-icon" aria-hidden="true">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="2.4" fill="#fff5e6"/>
      <circle cx="16" cy="16" r="5"  stroke="rgba(242,240,235,0.65)" stroke-width="0.7" fill="none"/>
      <circle cx="16" cy="16" r="9"  stroke="rgba(242,240,235,0.35)" stroke-width="0.55" fill="none" stroke-dasharray="1.5 3"/>
      <circle cx="16" cy="16" r="13" stroke="rgba(242,240,235,0.18)" stroke-width="0.45" fill="none"/>
    </svg>
  </span>
  <span class="chatbar-text">
    <span>Ask</span>
    <span class="ask-cycle-wrap" id="askCycleWrap" aria-hidden="true"></span>
  </span>
  <span class="chatbar-arrow" aria-hidden="true">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 8 L13 8 M9 4 L13 8 L9 12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>
