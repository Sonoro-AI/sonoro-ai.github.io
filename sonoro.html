<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONORO — Resonant Intelligence</title>
<meta name="description" content="Sonoro. Intelligence that resonates. Arriving 2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,200;0,300;0,400;1,200;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #07090a;
    --bg-mid:     #0d1014;
    --gold:       #c9a25f;
    --gold-warm:  #d4b276;
    --gold-soft:  rgba(201, 162, 95, 0.55);
    --gold-faint: rgba(201, 162, 95, 0.18);
    --parchment:  #f2f0eb;
    --muted:      rgba(242, 240, 235, 0.5);
    --faint:      rgba(242, 240, 235, 0.22);
    --hairline:   rgba(242, 240, 235, 0.1);

    /* Cinematic timing — matched to the audio's slow LFO breath */
    --fade-dur:   1.6s;
    --ease:       cubic-bezier(.22, .96, .24, 1);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--parchment);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body { cursor: none; }

  /* ── ATMOSPHERE ── */
  .atmosphere {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 22% 28%, rgba(201, 162, 95, 0.10) 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 78% 72%, rgba(60, 80, 120, 0.10) 0%, transparent 55%),
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(20, 26, 36, 0.45) 0%, transparent 75%),
      var(--bg-deep);
    animation: drift 28s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: scale(1)    translate(0, 0);     filter: hue-rotate(0deg); }
    100% { transform: scale(1.07) translate(-1.5%, 1%); filter: hue-rotate(8deg); }
  }
  .stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── RESONANCE MARK CANVAS ──
     padding-bottom shifts the rings' centre into the upper portion
     of the viewport, so the bright pearl sits clearly above SONORO
     while the faint outer rings still extend down for atmosphere. */
  .canvas-wrap {
    position: fixed; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    padding-bottom: 32vh;
    pointer-events: none;
  }
  #ringCanvas {
    width:  min(720px, 86vmin);
    height: min(720px, 86vmin);
    display: block;
    opacity: 0;
    transform: scale(0.86);
    animation: ringEmerge 4.2s 0.4s var(--ease) forwards;
    transition: opacity var(--fade-dur) var(--ease);
  }
  @keyframes ringEmerge {
    from { opacity: 0; transform: scale(0.86); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── GRAIN ── */
  .grain {
    position: fixed; inset: 0; z-index: 8;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    opacity: 0.05;
    mix-blend-mode: overlay;
  }

  /* ── STAGE  — absolute positioning so each focal element
        sits at exactly the same vertical anchor (viewport centre) ── */
  .stage {
    position: fixed; inset: 0; z-index: 4;
    pointer-events: none;
  }

  /* Wordmark — positioned in the lower-middle of the viewport (62% from top)
     so it sits clearly under the rings. The --word-x-offset is set by JS
     to nudge the rendered SONORO to true viewport horizontal centre. */
  .wordmark {
    position: absolute;
    left: 50%;
    top: 62%;
    transform: translate(calc(-50% + var(--word-x-offset, 0px)), -50%);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 200;
    font-size: clamp(58px, 11vw, 168px);
    letter-spacing: 0.34em;
    color: var(--parchment);
    line-height: 1;
    text-transform: uppercase;
    text-shadow: 0 0 80px rgba(201, 162, 95, 0.18);
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    transition: opacity var(--fade-dur) var(--ease);
  }
  .wordmark .ch {
    display: inline-block;
    opacity: 1;
    transform: translateY(0);
  }
  body.state-initial .wordmark { opacity: 1; }
  body.state-initial .wordmark .ch {
    opacity: 0;
    transform: translateY(28px);
    animation: chRise 1.6s var(--ease) forwards;
  }
  @keyframes chRise { to { opacity: 1; transform: translateY(0); } }
  body.show-cycling .wordmark,
  body.show-sonoro  .wordmark { opacity: 1; }

  /* Rule — positioned below SONORO independently */
  .rule {
    position: absolute;
    left: 50%;
    top: calc(62% + clamp(60px, 8.5vw, 110px));
    transform: translateX(-50%) scaleX(0.4);
    transform-origin: center;
    width: clamp(160px, 22vw, 260px);
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-soft) 50%, transparent);
    opacity: 0;
    transition: opacity var(--fade-dur) var(--ease), transform var(--fade-dur) var(--ease);
  }
  body.show-cycling .rule {
    opacity: 1;
    transform: translateX(-50%) scaleX(1);
  }

  /* Strapline — positioned below rule independently */
  .strapline {
    position: absolute;
    left: 50%;
    top: calc(62% + clamp(98px, 13vw, 165px));
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(20px, 2.6vw, 34px);
    color: var(--muted);
    display: flex; align-items: center;
    gap: 0.4em;
    letter-spacing: 0.04em;
    white-space: nowrap;
    opacity: 0;
    transition: opacity var(--fade-dur) var(--ease);
  }
  body.show-cycling .strapline { opacity: 1; }

  .cycle-wrap {
    position: relative;
    display: inline-block;
    overflow: visible;
    height: 1.4em;
    transition: width 0.7s var(--ease);
  }
  .cycle-word {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(calc(-50% + 60%));
    opacity: 0;
    color: var(--gold-warm);
    font-style: italic;
    white-space: nowrap;
    transition: transform 1.0s var(--ease),
                opacity   0.7s ease;
  }
  .cycle-word.enter { transform: translateY(-50%); opacity: 1; }
  .cycle-word.exit  { transform: translateY(calc(-50% - 60%)); opacity: 0; }

  /* Editorial № mark above each cycling word — tracked, uppercase, sans-serif */
  .cycle-word::before {
    content: attr(data-num);
    position: absolute;
    top: -1.4em;
    left: 0;
    font-family: 'DM Sans', sans-serif;
    font-style: normal;
    font-weight: 400;
    font-size: 0.32em;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold-warm);
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.5s ease;
  }
  .cycle-word.enter::before {
    opacity: 0.55;
    transition: opacity 0.7s ease 0.2s;
  }

  /* Editorial hairline rule beneath each cycling word — draws in on entry */
  .cycle-word::after {
    content: '';
    position: absolute;
    bottom: -0.32em;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--gold-warm);
    opacity: 0;
    transform-origin: left center;
    transform: scaleX(0);
    transition: transform 0.5s var(--ease), opacity 0.4s ease;
  }
  .cycle-word.enter::after {
    transform: scaleX(1);
    opacity: 0.42;
    transition: transform 1.1s var(--ease) 0.3s, opacity 0.5s ease 0.3s;
  }

  /* ── TAGLINE — sits under the rings at the same vertical anchor as SONORO ── */
  .tagline-center {
    position: fixed;
    top: 62%; left: 50%;
    transform: translate(-50%, -48%);
    z-index: 4;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(28px, 4.2vw, 56px);
    color: rgba(242, 240, 235, 0.78);
    letter-spacing: 0.04em;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    filter: blur(3px);
    transition: opacity var(--fade-dur) var(--ease),
                transform var(--fade-dur) var(--ease),
                filter var(--fade-dur) var(--ease);
    text-shadow: 0 0 60px rgba(201, 162, 95, 0.18);
  }
  body.show-tagline .tagline-center {
    opacity: 1;
    transform: translate(-50%, -50%);
    filter: blur(0);
  }

  /* ── ENTER BUTTON — matches the Listen pill aesthetic ── */
  .entry {
    position: fixed;
    top: 78%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 7;
    display: inline-flex; align-items: center;
    padding: 12px 32px;
    border: 1px solid rgba(201, 162, 95, 0.4);
    border-radius: 100px;
    background: rgba(7, 9, 10, 0.45);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--gold-warm);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    cursor: none;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    transition: opacity 2s var(--ease),
                border-color 0.6s ease,
                color 0.6s ease,
                background 0.6s ease;
  }
  .entry.show {
    opacity: 1;
    pointer-events: auto;
    animation: entryHalo 3.4s ease-in-out infinite;
  }
  @keyframes entryHalo {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201, 162, 95, 0); }
    50%      { box-shadow: 0 0 28px 2px rgba(201, 162, 95, 0.22); }
  }
  .entry:hover {
    border-color: var(--gold);
    color: var(--parchment);
    background: rgba(7, 9, 10, 0.65);
  }
  .entry.dismiss {
    animation: entryOut 1.6s var(--ease) forwards;
    pointer-events: none;
  }
  @keyframes entryOut {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.06); }
  }

  /* ── EDITORIAL METADATA ── */
  .meta {
    position: fixed; z-index: 5;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 2;
    opacity: 0;
    transition: opacity 2s ease;
  }
  body.entered .meta { opacity: 1; }
  .meta .lbl    { color: var(--faint); margin-right: 8px; }
  .meta .val    { color: var(--muted); }
  .meta .accent { color: var(--gold-warm); }
  .meta--tl { top: 36px; left: 44px; text-align: left; }
  .meta--tr { top: 36px; right: 44px; text-align: right; }
  .meta--bl { bottom: 36px; left: 44px; text-align: left; }
  .meta--br { bottom: 36px; right: 44px; text-align: right; }

  /* ── LISTEN PILL ── */
  .listen {
    position: fixed;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    display: flex; align-items: center; gap: 14px;
    padding: 11px 22px 11px 18px;
    border: 1px solid var(--hairline);
    border-radius: 100px;
    background: rgba(7, 9, 10, 0.45);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    cursor: none;
    pointer-events: auto;
    transition: all 0.5s var(--ease), opacity 2s ease;
    opacity: 0;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    user-select: none;
  }
  body.entered .listen { opacity: 1; }
  .listen:hover {
    border-color: var(--gold-soft);
    color: var(--parchment);
    background: rgba(7, 9, 10, 0.65);
  }
  .listen.active {
    border-color: var(--gold);
    color: var(--gold-warm);
  }
  .listen-icon {
    display: flex; align-items: flex-end;
    gap: 2px; height: 12px; width: 14px;
  }
  .listen-icon span {
    display: block;
    width: 2px; height: 4px;
    background: currentColor;
    border-radius: 1px;
    transition: height 0.2s ease;
  }
  .listen.active .listen-icon span {
    animation: bars 1.1s ease-in-out infinite;
  }
  .listen.active .listen-icon span:nth-child(1) { animation-delay:  0.0s; }
  .listen.active .listen-icon span:nth-child(2) { animation-delay: 0.18s; }
  .listen.active .listen-icon span:nth-child(3) { animation-delay: 0.36s; }
  .listen.active .listen-icon span:nth-child(4) { animation-delay: 0.54s; }
  @keyframes bars {
    0%, 100% { height: 3px; }
    50%      { height: 12px; }
  }

  /* ── CHATBAR — names left-aligned, like a real placeholder
     Positioned in the lower-middle of the viewport (62% from top)
     so it sits clearly below the rings rather than overlapping them */
  .chatbar {
    position: fixed;
    top: 62%; left: 50%;
    transform: translate(-50%, -52%) scale(0.97);
    z-index: 5;
    display: flex; align-items: center;
    padding: 18px 22px;
    width: clamp(360px, 60vw, 660px);
    border: 1px solid rgba(242, 240, 235, 0.12);
    border-radius: 100px;
    background: rgba(7, 9, 10, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 12px 48px rgba(0, 0, 0, 0.4),
      0 0 0 0.5px rgba(255, 255, 255, 0.04) inset;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--fade-dur) var(--ease),
                transform var(--fade-dur) var(--ease),
                border-color 0.6s ease,
                background 0.6s ease;
  }
  body.show-chatbar .chatbar {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .chatbar:hover {
    border-color: rgba(242, 240, 235, 0.22);
    background: rgba(7, 9, 10, 0.74);
  }
  .chatbar-icon {
    width: 32px; height: 32px;
    margin-right: 18px;
    flex-shrink: 0;
    display: block;
  }
  .chatbar-icon svg {
    width: 100%; height: 100%;
    animation: iconRotate 36s linear infinite, iconBreath 5.2s ease-in-out infinite;
    filter: drop-shadow(0 0 6px rgba(212, 178, 118, 0.32));
  }
  @keyframes iconRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes iconBreath {
    0%, 100% { opacity: 0.92; }
    50%      { opacity: 1;    }
  }
  .chatbar-text {
    flex: 1;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(18px, 2.2vw, 26px);
    color: rgba(242, 240, 235, 0.72);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: flex-start;  /* left-aligned, like a real placeholder */
    gap: 0.4em;
    white-space: nowrap;
    overflow: hidden;
  }
  .ask-cycle-wrap {
    position: relative;
    display: inline-block;
    overflow: hidden;
    height: 1.4em;
  }
  .ask-cycle-word {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(calc(-50% + 110%));
    opacity: 0;
    color: var(--gold-warm);
    font-style: italic;
    white-space: nowrap;
    transition: transform 1.0s var(--ease),
                opacity   0.7s ease;
  }
  .ask-cycle-word.enter { transform: translateY(-50%); opacity: 1; }
  .ask-cycle-word.exit  { transform: translateY(calc(-50% - 110%)); opacity: 0; }

  .chatbar-arrow {
    width: 18px; height: 18px;
    margin-left: 18px;
    color: var(--gold-soft);
    flex-shrink: 0;
    transition: color 0.5s ease, transform 0.5s var(--ease);
  }
  .chatbar-arrow svg { width: 100%; height: 100%; display: block; }
  .chatbar:hover .chatbar-arrow {
    color: var(--gold-warm);
    transform: translateX(3px);
  }

  /* ── CUSTOM CURSOR ── */
  .cursor {
    position: fixed;
    width: 28px; height: 28px;
    border: 1px solid var(--gold-soft);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.4s var(--ease),
                height 0.4s var(--ease),
                border-color 0.3s ease,
                opacity 0.3s ease;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    position: fixed;
    width: 3px; height: 3px;
    background: var(--gold-warm);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: opacity 0.3s ease;
  }
  .cursor.is-hover {
    width: 56px; height: 56px;
    border-color: var(--gold);
  }

  /* ── REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    .atmosphere { animation: none; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 760px) {
    body { cursor: auto; }
    .cursor, .cursor-dot { display: none; }

    .canvas-wrap { padding-bottom: 28vh; }

    .meta { font-size: 9px; letter-spacing: 0.28em; line-height: 1.9; }
    .meta--tl, .meta--bl { left: 22px; }
    .meta--tr, .meta--br { right: 22px; }
    .meta--tl, .meta--tr { top: 22px; }
    .meta--bl { bottom: 96px; }
    .meta--br { bottom: 96px; }

    .listen { bottom: 24px; }
    .wordmark { letter-spacing: 0.28em; }
    .entry { font-size: 10px; letter-spacing: 0.36em; top: 80%; }
    .chatbar {
      width: calc(100vw - 44px);
      padding: 14px 22px 14px 16px;
    }
    .chatbar-icon { width: 28px; height: 28px; margin-right: 14px; }
    .chatbar-arrow { margin-left: 14px; }
    .tagline-center {
      font-size: clamp(20px, 5.5vw, 34px);
      padding: 0 24px;
      white-space: normal;
      text-align: center;
    }
  }

  @media (max-height: 600px) {
    .canvas-wrap { padding-bottom: 22vh; }
  }
</style>
</head>
<body class="state-initial">

<!-- Atmosphere -->
<div class="atmosphere"></div>
<canvas class="stars" id="starsCanvas"></canvas>

<!-- Resonance mark (always visible — the constant) -->
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="ringCanvas"></canvas>
</div>

<!-- Grain -->
<div class="grain"></div>

<!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- Stage typography (SONORO + cycling) -->
<div class="stage">
  <h1 class="wordmark" id="wordmark" aria-label="Sonoro"></h1>
  <div class="rule" aria-hidden="true"></div>
  <div class="strapline">
    <span>Resonate</span>
    <span class="cycle-wrap" id="cycleWrap" aria-hidden="true"></span>
  </div>
</div>

<!-- Centred tagline (loop phases 1 + 3) -->
<div class="tagline-center" id="taglineCenter">Intelligence that resonates</div>

<!-- Enter button (initial state only) — pill style matching Listen -->
<button class="entry" id="entry" aria-label="Enter">Enter</button>

<!-- Editorial metadata -->
<div class="meta meta--bl">
  <div><span class="val">London · Swansea · Dubai</span></div>
</div>
<div class="meta meta--br">
  <div><span class="lbl">Arriving</span></div>
  <div><span class="accent">Autumn MMXXVI</span></div>
</div>

<!-- Listen toggle -->
<button class="listen" id="listen" aria-label="Toggle ambient sound">
  <span class="listen-icon" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </span>
  <span class="listen-label">Listening</span>
</button>

<!-- Chat bar (loop phase 4) -->
<div class="chatbar" id="chatbar" aria-label="Ask Sonoro">
  <span class="chatbar-icon" aria-hidden="true">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="2.4" fill="#fff5e6"/>
      <circle cx="16" cy="16" r="5"  stroke="rgba(242,240,235,0.65)" stroke-width="0.7" fill="none"/>
      <circle cx="16" cy="16" r="9"  stroke="rgba(242,240,235,0.35)" stroke-width="0.55" fill="none" stroke-dasharray="1.5 3"/>
      <circle cx="16" cy="16" r="13" stroke="rgba(242,240,235,0.18)" stroke-width="0.45" fill="none"/>
    </svg>
  </span>
  <span class="chatbar-text">
    <span>Ask</span>
    <span class="ask-cycle-wrap" id="askCycleWrap" aria-hidden="true"></span>
  </span>
  <span class="chatbar-arrow" aria-hidden="true">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 8 L13 8 M9 4 L13 8 L9 12" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </span>
</div>

<script>
  // ─────────────────────────────────────────────
  //  WORDMARK — characters for cascade
  // ─────────────────────────────────────────────
  const word = 'Sonoro';
  const wm = document.getElementById('wordmark');
  word.split('').forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'ch';
    span.textContent = ch;
    span.style.animationDelay = (0.0 + i * 0.10) + 's';
    wm.appendChild(span);
  });

  // Optical alignment — measure the rendered visible centre of SONORO
  // and shift the wordmark itself so its visual centre sits exactly
  // at viewport centre. Rings stay anchored at viewport centre, so
  // both align with the Enter button and Listen pill.
  function alignWordmarkToCentre() {
    const chars = wm.querySelectorAll('.ch');
    if (chars.length === 0) return;
    const first = chars[0].getBoundingClientRect();
    const last  = chars[chars.length - 1].getBoundingClientRect();
    if (first.width === 0 || last.width === 0) return;
    const wordCentre     = (first.left + last.right) / 2;
    const viewportCentre = window.innerWidth / 2;
    const shift = viewportCentre - wordCentre;
    document.documentElement.style.setProperty('--word-x-offset', shift.toFixed(2) + 'px');
  }
  requestAnimationFrame(alignWordmarkToCentre);
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(alignWordmarkToCentre);
  }
  window.addEventListener('resize', alignWordmarkToCentre);

  // ─────────────────────────────────────────────
  //  RESONANCE RINGS CANVAS
  // ─────────────────────────────────────────────
  const canvas = document.getElementById('ringCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  function sizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
  }
  const rings = [
    { r: 0.040, fill: true,  op: 0.95, w: 0   },
    { r: 0.085, fill: false, op: 0.55, w: 0.7, rot:  0.00018, dash: null },
    { r: 0.140, fill: false, op: 0.35, w: 0.6, rot: -0.00012, dash: [2, 8] },
    { r: 0.205, fill: false, op: 0.30, w: 0.6, rot:  0.00015, dash: null },
    { r: 0.275, fill: false, op: 0.22, w: 0.5, rot: -0.00010, dash: [1, 12] },
    { r: 0.350, fill: false, op: 0.18, w: 0.5, rot:  0.00009, dash: null },
    { r: 0.430, fill: false, op: 0.13, w: 0.5, rot: -0.00007, dash: [1, 16] },
    { r: 0.515, fill: false, op: 0.09, w: 0.4, rot:  0.00005, dash: null },
    { r: 0.605, fill: false, op: 0.06, w: 0.4, rot: -0.00004, dash: [1, 20] },
  ];
  let audioLevel = 0, targetAudioLevel = 0;
  function draw(t) {
    const w = canvas.width / dpr, h = canvas.height / dpr;
    const cx = w / 2, cy = h / 2;
    const baseR = Math.min(w, h) * 0.5;
    ctx.clearRect(0, 0, w, h);
    audioLevel += (targetAudioLevel - audioLevel) * 0.12;
    const breath = 1 + Math.sin(t * 0.0006) * 0.018 + audioLevel * 0.10;
    const glowR = baseR * 0.18 * breath;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR * 4);
    grad.addColorStop(0,    `rgba(212, 178, 118, ${0.28 + audioLevel * 0.20})`);
    grad.addColorStop(0.35, `rgba(201, 162, 95, ${0.10 + audioLevel * 0.06})`);
    grad.addColorStop(1,    'rgba(201, 162, 95, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    rings.forEach(ring => {
      const r = baseR * ring.r * breath;
      const rotation = (ring.rot || 0) * t;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);
      if (ring.fill) {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(242, 240, 235, ${ring.op})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 250, 240, 0.95)';
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(242, 240, 235, ${ring.op + audioLevel * 0.15})`;
        ctx.lineWidth = ring.w;
        ctx.setLineDash(ring.dash || []);
        ctx.stroke();
      }
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  sizeCanvas();
  window.addEventListener('resize', sizeCanvas);
  requestAnimationFrame(draw);

  // ─────────────────────────────────────────────
  //  STARFIELD
  // ─────────────────────────────────────────────
  const stars = document.getElementById('starsCanvas');
  const sctx = stars.getContext('2d');
  let starList = [];
  function sizeStars() {
    stars.width  = window.innerWidth  * dpr;
    stars.height = window.innerHeight * dpr;
    sctx.setTransform(1, 0, 0, 1, 0, 0);
    sctx.scale(dpr, dpr);
    starList = [];
    const count = Math.floor(window.innerWidth * window.innerHeight / 7500);
    for (let i = 0; i < count; i++) {
      starList.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 0.7 + 0.1,
        op: Math.random() * 0.32 + 0.05,
        tw: Math.random() * 0.0035 + 0.0015,
        ph: Math.random() * Math.PI * 2,
        warm: Math.random() < 0.18,
      });
    }
  }
  function drawStars(t) {
    sctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    starList.forEach(s => {
      const op = s.op * (0.45 + 0.55 * Math.sin(t * s.tw + s.ph));
      sctx.fillStyle = s.warm
        ? `rgba(212, 178, 118, ${op * 0.9})`
        : `rgba(242, 240, 235, ${op})`;
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      sctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  sizeStars();
  window.addEventListener('resize', sizeStars);
  requestAnimationFrame(drawStars);

  // ─────────────────────────────────────────────
  //  CURSOR
  // ─────────────────────────────────────────────
  const cursor = document.getElementById('cursor');
  const cursorDot = document.getElementById('cursorDot');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let cxp = mx, cyp = my;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorDot.style.left = mx + 'px';
    cursorDot.style.top  = my + 'px';
  });
  function followCursor() {
    cxp += (mx - cxp) * 0.14;
    cyp += (my - cyp) * 0.14;
    cursor.style.left = cxp + 'px';
    cursor.style.top  = cyp + 'px';
    requestAnimationFrame(followCursor);
  }
  followCursor();
  document.addEventListener('mouseleave', () => {
    cursor.style.opacity = '0'; cursorDot.style.opacity = '0';
  });
  document.addEventListener('mouseenter', () => {
    cursor.style.opacity = '1'; cursorDot.style.opacity = '1';
  });
  function bindHovers() {
    document.querySelectorAll('button, a, .chatbar').forEach(el => {
      if (el.dataset.hoverBound) return;
      el.dataset.hoverBound = '1';
      el.addEventListener('mouseenter', () => cursor.classList.add('is-hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('is-hover'));
    });
  }

  // ─────────────────────────────────────────────
  //  CYCLE WORD MACHINERY
  // ─────────────────────────────────────────────
  function measureWidest(words, fontSize) {
    const ruler = document.createElement('span');
    ruler.style.cssText = [
      'position:absolute', 'visibility:hidden',
      'font-family:"Cormorant Garamond",serif',
      'font-style:italic', 'font-weight:300',
      `font-size:${fontSize}`,
      'white-space:nowrap', 'letter-spacing:0.04em',
    ].join(';');
    document.body.appendChild(ruler);
    let max = 0;
    words.forEach(w => { ruler.textContent = w; max = Math.max(max, ruler.offsetWidth); });
    document.body.removeChild(ruler);
    return max;
  }

  function measureEach(words, fontSize) {
    const ruler = document.createElement('span');
    ruler.style.cssText = [
      'position:absolute', 'visibility:hidden',
      'font-family:"Cormorant Garamond",serif',
      'font-style:italic', 'font-weight:300',
      `font-size:${fontSize}`,
      'white-space:nowrap', 'letter-spacing:0.04em',
    ].join(';');
    document.body.appendChild(ruler);
    const widths = words.map(w => { ruler.textContent = w; return ruler.offsetWidth; });
    document.body.removeChild(ruler);
    return widths;
  }

  // Strapline: Resonate [cycling collection] — eight modules
  const words = ['Healthcare', 'Education', 'Mentors', 'Artificial Intelligence', 'Publishing', 'Learning', 'Innovation', 'Recruitment'];
  const cWrap = document.getElementById('cycleWrap');
  let wordWidths = measureEach(words, 'clamp(20px,2.6vw,34px)');
  function setCycleWidth() {
    wordWidths = measureEach(words, 'clamp(20px,2.6vw,34px)');
    cWrap.style.width = (wordWidths[0] + 4) + 'px';
  }
  setCycleWidth();
  window.addEventListener('resize', setCycleWidth);
  const wEls = words.map((w, i) => {
    const el = document.createElement('span');
    el.className = 'cycle-word';
    el.textContent = w;
    el.dataset.num = `№ ${String(i + 1).padStart(2, '0')}`;
    cWrap.appendChild(el);
    return el;
  });
  let wIdx = 0;
  const showW = i => {
    cWrap.style.width = (wordWidths[i] + 4) + 'px';
    wEls[i].classList.remove('exit');
    wEls[i].classList.add('enter');
  };
  const hideW = i => { wEls[i].classList.remove('enter'); wEls[i].classList.add('exit'); };

  const CYCLE_INTERVAL = 2500;  // 2.5s per word — eight modules

  function runCycleOnce() {
    wEls.forEach(el => el.classList.remove('enter', 'exit'));
    wIdx = 0;
    showW(0);
    const interval = setInterval(() => {
      const next = (wIdx + 1) % words.length;
      hideW(wIdx);
      setTimeout(() => showW(next), 250);
      wIdx = next;
    }, CYCLE_INTERVAL);
    setTimeout(() => clearInterval(interval), CYCLE_INTERVAL * (words.length - 1) + 100);
  }

  // Chatbar: Ask Sonoro / Marco Pierre White / Lino Carbosiero / Alayne Hilton-Gold
  const askWords = ['Sonoro', 'Marco Pierre White', 'Lino Carbosiero', 'Alayne Hilton-Gold'];
  const askWrap = document.getElementById('askCycleWrap');
  function setAskWidth() {
    askWrap.style.width = (measureWidest(askWords, 'clamp(18px,2.2vw,26px)') + 4) + 'px';
  }
  setAskWidth();
  window.addEventListener('resize', setAskWidth);
  const askEls = askWords.map(w => {
    const el = document.createElement('span');
    el.className = 'ask-cycle-word';
    el.textContent = w;
    askWrap.appendChild(el);
    return el;
  });
  let askIdx = 0;
  const showA = i => { askEls[i].classList.remove('exit'); askEls[i].classList.add('enter'); };
  const hideA = i => { askEls[i].classList.remove('enter'); askEls[i].classList.add('exit'); };

  function runAskCycleOnce() {
    askEls.forEach(el => el.classList.remove('enter', 'exit'));
    askIdx = 0;
    showA(0);
    const interval = setInterval(() => {
      const next = (askIdx + 1) % askWords.length;
      hideA(askIdx);
      setTimeout(() => showA(next), 250);
      askIdx = next;
    }, ASK_CYCLE_INTERVAL);
    setTimeout(() => clearInterval(interval), ASK_CYCLE_INTERVAL * (askWords.length - 1) + 100);
  }
  const ASK_CYCLE_INTERVAL = 3000;  // 3s per name — slower for longer chef names

  // ─────────────────────────────────────────────
  //  AMBIENT AUDIO
  // ─────────────────────────────────────────────
  const listenBtn = document.getElementById('listen');
  let audioCtx = null, audioOn = false, masterGain = null, analyser = null, audioData = null;
  function initAudio() {
    audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;

    // ── Convolution reverb with a procedurally-generated cathedral impulse ──
    function makeReverbImpulse(ctx, duration, decay) {
      const sampleRate = ctx.sampleRate;
      const length = Math.floor(sampleRate * duration);
      const impulse = ctx.createBuffer(2, length, sampleRate);
      for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        // Tiny pre-delay (early reflections silence) for a sense of room size
        const preDelay = Math.floor(sampleRate * 0.025);
        for (let i = 0; i < length; i++) {
          if (i < preDelay) { data[i] = 0; continue; }
          const t = (i - preDelay) / (length - preDelay);
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay);
        }
      }
      return impulse;
    }
    const reverb = audioCtx.createConvolver();
    reverb.buffer = makeReverbImpulse(audioCtx, 6.5, 3.2);

    // Wet / dry mix bus
    const wetGain = audioCtx.createGain();   wetGain.gain.value = 0.38;
    const dryGain = audioCtx.createGain();   dryGain.gain.value = 0.62;
    const mixBus  = audioCtx.createGain();   mixBus.gain.value  = 0.55;
    reverb.connect(wetGain); wetGain.connect(mixBus);
    dryGain.connect(mixBus);
    mixBus.connect(masterGain);

    // Analyser for the rings' breath
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 64;
    audioData = new Uint8Array(analyser.frequencyBinCount);
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);

    // ── Drone voices: each fundamental builds an additive harmonic stack,
    //    each harmonic is a 3-oscillator chorus detuned by a few cents ──
    const voices = [
      { f0: 55,   harms: [{n:1, g:0.20, type:'sine'},     {n:2, g:0.12, type:'sine'},     {n:3, g:0.06, type:'triangle'}], detune: 4, lfoFreq: 0.05, lfoDepth: 0.05 },
      { f0: 82.4, harms: [{n:1, g:0.14, type:'sine'},     {n:2, g:0.09, type:'triangle'}, {n:3, g:0.04, type:'sine'}],     detune: 3, lfoFreq: 0.07, lfoDepth: 0.04 },
      { f0: 220,  harms: [{n:1, g:0.07, type:'triangle'}, {n:2, g:0.04, type:'sine'}],                                     detune: 6, lfoFreq: 0.09, lfoDepth: 0.03 },
    ];
    voices.forEach(v => {
      const voiceGain = audioCtx.createGain(); voiceGain.gain.value = 1;
      voiceGain.connect(dryGain); voiceGain.connect(reverb);

      const lfo     = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = v.lfoFreq;
      lfoGain.gain.value  = v.lfoDepth;
      lfo.connect(lfoGain); lfoGain.connect(voiceGain.gain);
      lfo.start();

      v.harms.forEach(h => {
        const harmGain = audioCtx.createGain();
        harmGain.gain.value = h.g;
        harmGain.connect(voiceGain);
        [-v.detune, 0, v.detune].forEach(cents => {
          const osc = audioCtx.createOscillator();
          osc.type = h.type;
          osc.frequency.value = v.f0 * h.n;
          osc.detune.value = cents;
          osc.connect(harmGain);
          osc.start();
        });
      });
    });

    // ── FM bell layer: occasional celesta-like top notes via inharmonic FM ──
    const bellBus = audioCtx.createGain(); bellBus.gain.value = 0.7;
    const bellFilter = audioCtx.createBiquadFilter();
    bellFilter.type = 'lowpass';
    bellFilter.frequency.value = 4800;
    bellFilter.Q.value = 0.4;
    bellFilter.connect(bellBus);
    bellBus.connect(dryGain); bellBus.connect(reverb);

    function ringBell(freq, vel) {
      const t = audioCtx.currentTime;
      const carrier   = audioCtx.createOscillator();
      const modulator = audioCtx.createOscillator();
      const modGain   = audioCtx.createGain();
      const env       = audioCtx.createGain();

      carrier.type = 'sine';
      carrier.frequency.value = freq;
      modulator.type = 'sine';
      modulator.frequency.value = freq * 3.41;   // inharmonic FM ratio for bell
      modGain.gain.value = freq * 1.8;           // FM index — controls metallic edge

      modulator.connect(modGain);
      modGain.connect(carrier.frequency);

      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(vel, t + 0.035);
      env.gain.exponentialRampToValueAtTime(0.0001, t + 5.0);

      carrier.connect(env);
      env.connect(bellFilter);

      carrier.start(t);  modulator.start(t);
      carrier.stop(t + 5.4); modulator.stop(t + 5.4);
    }

    // A-pentatonic-ish cluster sitting consonantly above the drone
    const bellNotes = [880, 1318.51, 1760, 1975.53, 2637.02];   // A5, E6, A6, B6, E7
    function scheduleBells() {
      if (!audioOn) { setTimeout(scheduleBells, 4000); return; }
      const note = bellNotes[Math.floor(Math.random() * bellNotes.length)];
      const vel  = 0.022 + Math.random() * 0.022;
      ringBell(note, vel);
      const nextDelay = 7000 + Math.random() * 13000;
      setTimeout(scheduleBells, nextDelay);
    }
    setTimeout(scheduleBells, 4500);

    function readAudio() {
      if (analyser) {
        analyser.getByteFrequencyData(audioData);
        let sum = 0;
        for (let i = 0; i < audioData.length; i++) sum += audioData[i];
        targetAudioLevel = (sum / audioData.length) / 255;
      }
      requestAnimationFrame(readAudio);
    }
    readAudio();
  }
  function startAudio() {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioOn = true;
    listenBtn.classList.add('active');
    listenBtn.querySelector('.listen-label').textContent = 'Listening';
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.42, audioCtx.currentTime + 3.0);
  }
  function stopAudio() {
    if (!audioCtx) return;
    audioOn = false;
    listenBtn.classList.remove('active');
    listenBtn.querySelector('.listen-label').textContent = 'Listen';
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.6);
    setTimeout(() => { targetAudioLevel = 0; }, 1600);
  }
  listenBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (!audioCtx) { startAudio(); return; }
    if (audioOn) stopAudio(); else startAudio();
  });

  // ─────────────────────────────────────────────
  //  INITIAL STATE → ENTER → INFINITE LOOP
  //  Pacing matched to audio LFO breath (~10-14s)
  // ─────────────────────────────────────────────
  const entry = document.getElementById('entry');

  // Show Enter button after the rings + SONORO have settled
  setTimeout(() => entry.classList.add('show'), 4500);

  const FADE_DURATION   = 1600;   // 1.6s — matches CSS --fade-dur
  const TRANSITION_GAP  = 350;    // tighter breath of just rings between phases

  // Rings visibility — fade out when chat bar takes the screen
  function setRingsVisible(visible) {
    canvas.style.transition = `opacity ${FADE_DURATION}ms cubic-bezier(.22, .96, .24, 1)`;
    canvas.style.opacity = visible ? '1' : '0';
  }

  // Each phase: fade-in (FADE_DURATION) → visibleTime → fade-out (FADE_DURATION) → gap
  const sequence = [
    { class: 'show-tagline', visibleTime: 3500,  onEnter: null,                                                 onExit: null },
    { class: 'show-chatbar', visibleTime: 12000, onEnter: () => { runAskCycleOnce(); setRingsVisible(false); }, onExit: () => setRingsVisible(true) },
    { class: 'show-tagline', visibleTime: 3500,  onEnter: null,                                                 onExit: null },
    { class: 'show-cycling', visibleTime: 20000, onEnter: () => runCycleOnce(),                                 onExit: null },
    { class: 'show-sonoro',  visibleTime: 3500,  onEnter: null,                                                 onExit: null },
  ];
  let stateIdx = 0;

  function runState() {
    const state = sequence[stateIdx];
    document.body.classList.add(state.class);
    if (state.onEnter) state.onEnter();
    setTimeout(() => {
      document.body.classList.remove(state.class);
      if (state.onExit) state.onExit();
      setTimeout(() => {
        stateIdx = (stateIdx + 1) % sequence.length;
        runState();
      }, FADE_DURATION + TRANSITION_GAP);
    }, FADE_DURATION + state.visibleTime);
  }

  function enterExperience() {
    entry.classList.add('dismiss');
    entry.classList.remove('show');
    startAudio();
    document.body.classList.add('entered');
    bindHovers();

    // Let SONORO fade out gracefully before the loop's first phase begins
    setTimeout(() => {
      document.body.classList.remove('state-initial');
      setTimeout(runState, FADE_DURATION + TRANSITION_GAP);
    }, 800);

    setTimeout(() => entry.remove(), 1800);
  }

  entry.addEventListener('click', e => {
    e.stopPropagation();
    enterExperience();
  });

  bindHovers();
</script>
</body>
</html>
